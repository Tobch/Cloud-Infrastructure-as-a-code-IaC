AWSTemplateFormatVersion: '2010-09-09'
Description: High Availability Cloud Infrastructure as Code (IaC) - Project 3

Parameters:
  EnvironmentName:
    Description: The name of the environment, used as a prefix for resource tags
    Type: String
  VpcNetCIDR:
    Description: Enter the IP range (CIDR notation) for the VPC
    Type: String
    Default: 10.0.0.0/16
  PubSubnet01CIDR:
    Description: Enter the IP range for the public subnet in Availability Zone 1
    Type: String
    Default: 10.0.1.0/24
  PubSubnet02CIDR:
    Description: Enter the IP range for the public subnet in Availability Zone 2
    Type: String
    Default: 10.0.2.0/24
  PrivSubnet01CIDR:
    Description: Enter the IP range for the private subnet in Availability Zone 1
    Type: String
    Default: 10.0.3.0/24
  PrivSubnet02CIDR:
    Description: Enter the IP range for the private subnet in Availability Zone 2
    Type: String
    Default: 10.0.4.0/24
  InstanceType:
    Description: The EC2 instance type of general purpose used for the web servers
    Type: String
    Default: t3.micro
    AllowedValues: [t2.medium, t3.nano, t3.micro, t3.small, t3.medium, t3.large, t3.xlarge, t3.2xlarge]
  # Automatically uses the latest Amazon Linux 2 AMI.
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2

Resources:
  # 1. Virtual Private Cloud (VPC)
  MainVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcNetCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: "Name"
          Value: !Ref EnvironmentName

  # 2. Public Subnet 1 (Availability Zone A)
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      AvailabilityZone: !Select [0, !GetAZs ''] 
      CidrBlock: !Ref PubSubnet01CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: 'Name'
          Value: !Sub '${EnvironmentName}-PublicSubnet1'

  # 3. Remaining Subnets
  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      AvailabilityZone: !Select [1, !GetAZs ''] 
      CidrBlock: !Ref PubSubnet02CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: 'Name'
          Value: !Sub '${EnvironmentName}-PublicSubnet2'

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      AvailabilityZone: !Select [0, !GetAZs ''] 
      CidrBlock: !Ref PrivSubnet01CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: 'Name'
          Value: !Sub '${EnvironmentName}-PrivateSubnet1'

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref MainVPC
      AvailabilityZone: !Select [1, !GetAZs ''] 
      CidrBlock: !Ref PrivSubnet02CIDR
      MapPublicIpOnLaunch: false
      Tags:
        - Key: 'Name'
          Value: !Sub '${EnvironmentName}-PrivateSubnet2'

  # 4. Internet Gateway
  IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: "Name"
          Value: "InternetGW"

  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref MainVPC
      InternetGatewayId: !Ref IGW

  # 5. Elastic IPs and NAT Gateways
  NatGwEIP01:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties:
      Tags:
        - Key: "Name"
          Value: "NatGwEIP01"

  NatGw01:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGwEIP01.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: "Name"
          Value: "NatGw01"

  NatGwEIP02:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties:
      Tags:
        - Key: "Name"
          Value: "NatGwEIP02"

  NatGw02:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGwEIP02.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: "Name"
          Value: "NatGw02"

  # 6. Route Tables and Associations
  PubRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags:
        - Key: "Name"
          Value: "PubRouteTable"

  PubRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties:
      RouteTableId: !Ref PubRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  PubSubnet1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PubRouteTable

  PubSubnet2Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PubRouteTable

  PrivRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags:
        - Key: "Name"
          Value: "PrivRouteTable1"

  PrivRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGw01

  PrivSubnet1Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivRouteTable1

  PrivRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref MainVPC
      Tags:
        - Key: "Name"
          Value: "PrivRouteTable2"

  PrivRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGw02

  PrivSubnet2Assoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivRouteTable2
  
  # 7. Security Groups
  LBSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP to Load Balancer
      VpcId: !Ref MainVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ServerSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from LB
      VpcId: !Ref MainVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !GetAtt LBSecGroup.GroupId

  # 8. Load Balancer and Target Group
  LB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref LBSecGroup

  LBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 10
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 8
      HealthyThresholdCount: 2
      Port: 80
      Protocol: HTTP
      UnhealthyThresholdCount: 5
      VpcId: !Ref MainVPC

  LBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref LBTargetGroup
      LoadBalancerArn: !Ref LB
      Port: 80
      Protocol: HTTP

  ALBListenerRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - Type: forward
          TargetGroupArn: !Ref LBTargetGroup
      Conditions:
        - Field: path-pattern
          Values: [/]
      ListenerArn: !Ref LBListener
      Priority: 1

  # 9. Launch Template 
  HAProjectLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: !Ref InstanceType
        NetworkInterfaces:
          - AssociatePublicIpAddress: false
            DeviceIndex: '0'
            Groups:
              - !GetAtt ServerSecGroup.GroupId
        BlockDeviceMappings:
          - DeviceName: /dev/sdm
            Ebs:
              VolumeSize: '8'
        UserData:
          Fn::Base64: |
            #!/bin/bash
            # The NAT gateway route can take a moment to start carrying traffic, so
            # keep retrying the install until the yum repos are actually reachable.
            for i in $(seq 1 30); do
              yum install -y httpd && break
              echo "yum not reachable yet (attempt $i) - retrying in 10s"
              sleep 10
            done
            mkdir -p /var/www/html
            echo '<html><head><meta charset="utf-8"><title>Team 7 - Cloud IaC Project</title></head><body style="font-family:Arial,Helvetica,sans-serif;text-align:center;color:#ffffff;background:linear-gradient(135deg,#0d3b4f,#126d78,#1aa3a3);min-height:100vh;margin:0;padding:70px 20px"><h1 style="font-size:64px;font-weight:300;margin:0 0 36px">It Works!</h1><h2 style="font-weight:400;font-size:26px;margin:6px 0">Cloud Computing CSE456</h2><h2 style="font-weight:400;font-size:26px;margin:6px 0">Infrastructure as Code</h2><h3 style="font-size:22px;margin:30px 0 18px">Team 7</h3><table style="margin:0 auto;border-collapse:collapse;font-size:18px"><tr style="background:rgba(255,255,255,0.18)"><th style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">Name</th><th style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">ID</th></tr><tr><td style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">Ahmed Mohamed Elsayed Tabbash</td><td style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">20P1076</td></tr><tr style="background:rgba(255,255,255,0.08)"><td style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">Yaman Abdelhamid Elewa</td><td style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">2002078</td></tr><tr><td style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">Ahmed Abdallah Nofull</td><td style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">22P0255</td></tr><tr style="background:rgba(255,255,255,0.08)"><td style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">Ferass Ahmed Mostafa</td><td style="border:1px solid rgba(255,255,255,0.6);padding:12px 28px">23P0304</td></tr></table></body></html>' > /var/www/html/index.html
            systemctl enable httpd
            systemctl start httpd

  # 10. Auto-Scaling Group utilizing the Launch Template
  ServersAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    # The EC2 instances use the NAT gateways to access the internet and install Apache.
    DependsOn:
      - PrivRoute1
      - PrivRoute2
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref HAProjectLaunchTemplate
        Version: !GetAtt HAProjectLaunchTemplate.LatestVersionNumber
      MinSize: '2'
      MaxSize: '3'
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      TargetGroupARNs:
        - !Ref LBTargetGroup

  # 11. Database Security Group & Subnet Group
  DBSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow MySQL access from backend servers
      VpcId: !Ref MainVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !GetAtt ServerSecGroup.GroupId

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: "Database subnet group for private subnets"
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2

  # 12.RDS
  database1:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AllocatedStorage: '20'
      AllowMajorVersionUpgrade: true
      AutoMinorVersionUpgrade: true
      BackupRetentionPeriod: 0   
      PubliclyAccessible: false
      MultiAZ: false             
      DBInstanceClass: db.t3.micro
      DBInstanceIdentifier: database-1
      DBName: myDB
      DBSubnetGroupName: !Ref DBSubnetGroup
      Engine: MySQL
      MasterUsername: admin
      ManageMasterUserPassword: true 
      NetworkType: 'IPV4'
      Port: '3306'
      StorageEncrypted: true
      StorageType: 'gp2'
      VPCSecurityGroups:
        - !GetAtt DBSecGroup.GroupId

Outputs:
  VPC:
    Description: A reference to the created VPC
    Value: !Ref MainVPC
    Export:
      Name: !Sub ${EnvironmentName}-VPCID

  PublicSubnets:
    Description: A list of the public subnets
    Value: !Join [",", [!Ref PublicSubnet1, !Ref PublicSubnet2]]
    Export:
      Name: !Sub ${EnvironmentName}-PUB-NETS

  PrivateSubnets:
    Description: A list of the private subnets
    Value: !Join [",", [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
    Export:
      Name: !Sub ${EnvironmentName}-PRIV-NETS

  WebAppLoadBalancerDNSName:
    Description: DNS name or Public URL of the Load Balancer
    Value: !Join ["", ["http://", !GetAtt LB.DNSName]]
    Export:
      Name: !Sub ${EnvironmentName}-LB-DNSName